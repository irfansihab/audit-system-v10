# USULAN OTOMATIS dari basis regulasi wiki — 2026-07-17
# Sumber: Pengendalian Intern atas Pelaporan Keuangan (PIPK). Deterministik, BUKAN hasil LLM.
id: USL-PMK-17-2019
revisi: "usulan-wiki"
nama: "Kepatuhan PMK 17/PMK.09/2019 (Pedoman Penerapan, Penilaian & Reviu PIPK Pempus) — ganti PMK 14/PMK.09/2017 (usulan — ambang belum ditetapkan)"
catatan_revisi: |
  Usulan kriteria yang dibangun otomatis dari basis regulasi wiki. Metric dan
  seluruh ambang adalah PLACEHOLDER — WAJIB diganti PT sebelum dipakai menilai
  data riil. Dimensi/sumber_data adalah TEBAKAN kata kunci; koreksi bila salah.

tipe: numeric_threshold
dimensi: ANGGARAN
sumber_data: dipa
satker_terapkan: [ALL]

regulasi:
  - "PMK 17/PMK.09/2019 (Pedoman Penerapan, Penilaian & Reviu PIPK Pempus) — ganti PMK 14/PMK.09/2017"
  - "PMK 17/PMK.09/2019 (Pedoman Penerapan, Penilaian & Reviu PIPK Pempus) — ganti PMK 14/PMK.09/2017 — Istilah/Aspek (Substansi)"
  - "PMK 17/PMK.09/2019 (Pedoman Penerapan, Penilaian & Reviu PIPK Pempus) — ganti PMK 14/PMK.09/2017 — PITE** (Tingkat Entitas) (Pengendalian yang memberi keyakinan atas **keseluruhan** proses/transaksi/akun/asersi LK.)"
  - "PMK 17/PMK.09/2019 (Pedoman Penerapan, Penilaian & Reviu PIPK Pempus) — ganti PMK 14/PMK.09/2017 — Tingkat Proses/Transaksi (Memitigasi risiko pemrosesan transaksi **spesifik** (akun/asersi tertentu).)"

metric:
  # PLACEHOLDER — ganti dengan metrik nyata (lihat kriteria lain sbg contoh).
  expression: "count(WHERE data.tidak_sesuai == TRUE)"
  satuan: kasus
  format_display: "{:.0f} kasus"

thresholds:
  - status: MERAH
    condition: ">=1"
    catatan: "[GANTI] placeholder — tetapkan ambang riil bersama auditor"
  - status: HIJAU
    condition: "<1"
    catatan: "[GANTI] placeholder"

evidence_fields:
  - data.satker
