# USULAN OTOMATIS dari basis regulasi wiki — 2026-07-17
# Sumber: Penyusunan RKA-K/L. Deterministik, BUKAN hasil LLM.
id: USL-PMK-SBM-STANDAR-BIAYA-MASUKAN
revisi: "usulan-wiki"
nama: "Kepatuhan PMK SBM (Standar Biaya Masukan) (usulan — ambang belum ditetapkan)"
catatan_revisi: |
  Usulan kriteria yang dibangun otomatis dari basis regulasi wiki. Metric dan
  seluruh ambang adalah PLACEHOLDER — WAJIB diganti PT sebelum dipakai menilai
  data riil. Dimensi/sumber_data adalah TEBAKAN kata kunci; koreksi bila salah.

tipe: numeric_threshold
dimensi: ANGGARAN
sumber_data: dipa
satker_terapkan: [ALL]

regulasi:
  - "PMK SBM (Standar Biaya Masukan)"
  - "PMK SBM (Standar Biaya Masukan) — Tahun (PMK)"
  - "PMK SBM (Standar Biaya Masukan) — 2024 (PMK 39/2024 (atau pengganti))"
  - "PMK SBM (Standar Biaya Masukan) — 2025 (PMK terbaru tahun berjalan)"

metric:
  # PLACEHOLDER — ganti dengan metrik nyata (lihat kriteria lain sbg contoh).
  expression: "count(WHERE data.tidak_sesuai == TRUE)"
  satuan: kasus
  format_display: "{:.0f} kasus"

thresholds:
  - status: MERAH
    condition: ">=1"
    catatan: "[GANTI] placeholder — tetapkan ambang riil bersama auditor"
  - status: HIJAU
    condition: "<1"
    catatan: "[GANTI] placeholder"

evidence_fields:
  - data.satker
