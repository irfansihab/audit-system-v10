# USULAN OTOMATIS dari basis regulasi wiki — 2026-07-17
# Sumber: Evaluasi AKIP/SAKIP & Reformasi Birokrasi. Deterministik, BUKAN hasil LLM.
id: USL-EVALUASI-REFORMASI-BIROKRASI-RB
revisi: "usulan-wiki"
nama: "Kepatuhan Evaluasi Reformasi Birokrasi (RB) (usulan — ambang belum ditetapkan)"
catatan_revisi: |
  Usulan kriteria yang dibangun otomatis dari basis regulasi wiki. Metric dan
  seluruh ambang adalah PLACEHOLDER — WAJIB diganti PT sebelum dipakai menilai
  data riil. Dimensi/sumber_data adalah TEBAKAN kata kunci; koreksi bila salah.

tipe: numeric_threshold
dimensi: KINERJA
sumber_data: kinerja_eperformance
satker_terapkan: [ALL]

regulasi:
  - "Evaluasi Reformasi Birokrasi (RB)"
  - "Evaluasi Reformasi Birokrasi (RB) — Regulasi (Substansi)"
  - "Evaluasi Reformasi Birokrasi (RB) — PermenPAN-RB 9/2023 (Pedoman Evaluasi Pelaksanaan Reformasi Birokrasi.)"
  - "Evaluasi Reformasi Birokrasi (RB) — KepmenPAN-RB 182/2024 (Juknis evaluasi RB.)"

metric:
  # PLACEHOLDER — ganti dengan metrik nyata (lihat kriteria lain sbg contoh).
  expression: "count(WHERE data.tidak_sesuai == TRUE)"
  satuan: kasus
  format_display: "{:.0f} kasus"

thresholds:
  - status: MERAH
    condition: ">=1"
    catatan: "[GANTI] placeholder — tetapkan ambang riil bersama auditor"
  - status: HIJAU
    condition: "<1"
    catatan: "[GANTI] placeholder"

evidence_fields:
  - data.satker
